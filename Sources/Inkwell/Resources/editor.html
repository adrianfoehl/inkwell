<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milkdown Editor</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

      /* Light mode */
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --accent: #0071e3;
      --code-bg: #f0f0f0;
      --blockquote-border: #d0d0d0;
      --selection-bg: rgba(0, 113, 227, 0.15);
    }

    html.dark {
      --bg: #1c1c1e;
      --surface: #2c2c2e;
      --border: #3a3a3c;
      --text: #f5f5f7;
      --text-muted: #98989d;
      --accent: #2997ff;
      --code-bg: #2c2c2e;
      --blockquote-border: #3a3a3c;
      --selection-bg: rgba(41, 151, 255, 0.2);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #editor-root {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ProseMirror container */
    .milkdown {
      width: 100%;
      height: 100%;
    }

    .milkdown .editor {
      outline: none;
      width: 100%;
      min-height: 100vh;
      padding: 48px 56px;
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      caret-color: var(--accent);
    }

    /* Selection */
    .milkdown .editor ::selection {
      background: var(--selection-bg);
    }

    /* Placeholder */
    .milkdown .editor > p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      pointer-events: none;
      float: left;
      height: 0;
    }

    /* Headings */
    .milkdown .editor h1,
    .milkdown .editor h2,
    .milkdown .editor h3,
    .milkdown .editor h4,
    .milkdown .editor h5,
    .milkdown .editor h6 {
      font-family: var(--font);
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      margin-top: 1.6em;
      margin-bottom: 0.5em;
    }

    .milkdown .editor h1 { font-size: 2em; font-weight: 700; margin-top: 0; }
    .milkdown .editor h2 { font-size: 1.5em; }
    .milkdown .editor h3 { font-size: 1.25em; }
    .milkdown .editor h4 { font-size: 1.1em; }
    .milkdown .editor h5, .milkdown .editor h6 { font-size: 1em; }

    /* Paragraph */
    .milkdown .editor p {
      margin-bottom: 0.9em;
    }

    /* Links */
    .milkdown .editor a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* Strong & Em */
    .milkdown .editor strong { font-weight: 600; }
    .milkdown .editor em { font-style: italic; }

    /* Strikethrough */
    .milkdown .editor s,
    .milkdown .editor del {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Inline code */
    .milkdown .editor code {
      font-family: var(--font-mono);
      font-size: 0.875em;
      background: var(--code-bg);
      color: var(--text);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Code block */
    .milkdown .editor pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      margin: 1em 0;
    }

    .milkdown .editor pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.875em;
      line-height: 1.6;
    }

    /* Blockquote */
    .milkdown .editor blockquote {
      border-left: 3px solid var(--blockquote-border);
      padding-left: 16px;
      margin: 1em 0;
      color: var(--text-muted);
    }

    /* Lists */
    .milkdown .editor ul,
    .milkdown .editor ol {
      padding-left: 24px;
      margin-bottom: 0.9em;
    }

    .milkdown .editor li {
      margin-bottom: 0.3em;
    }

    .milkdown .editor li > p {
      margin-bottom: 0.3em;
    }

    /* Task list */
    .milkdown .editor ul[data-type="taskList"] {
      list-style: none;
      padding-left: 0;
    }

    .milkdown .editor li[data-type="taskItem"] {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .milkdown .editor li[data-type="taskItem"] > label {
      flex-shrink: 0;
      margin-top: 3px;
    }

    .milkdown .editor li[data-type="taskItem"] > div {
      flex: 1;
    }

    /* Horizontal rule */
    .milkdown .editor hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    /* Table */
    .milkdown .editor table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 0.95em;
    }

    .milkdown .editor th,
    .milkdown .editor td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }

    .milkdown .editor th {
      background: var(--surface);
      font-weight: 600;
    }

    .milkdown .editor tr:nth-child(even) td {
      background: color-mix(in srgb, var(--surface) 50%, transparent);
    }

    /* Image */
    .milkdown .editor img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      margin: 0.5em 0;
    }

    /* ProseMirror-specific */
    .ProseMirror {
      outline: none;
    }

    .ProseMirror-selectednode {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .milkdown .editor {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div id="editor-root"></div>

  <script type="module">
    import { Editor, defaultValueCtx, editorViewCtx, rootCtx } from 'https://esm.sh/@milkdown/kit@7.19.1/core';
    import { commonmark } from 'https://esm.sh/@milkdown/kit@7.19.1/preset/commonmark';
    import { gfm } from 'https://esm.sh/@milkdown/kit@7.19.1/preset/gfm';
    import { listener, listenerCtx } from 'https://esm.sh/@milkdown/kit@7.19.1/plugin/listener';
    import { getMarkdown, replaceAll } from 'https://esm.sh/@milkdown/kit@7.19.1/utils';

    // ─── State ────────────────────────────────────────────────────────────────

    let editor = null;
    let isSettingContent = false; // guard: don't echo back programmatic updates

    // ─── Appearance ───────────────────────────────────────────────────────────

    function applyAppearance(mode) {
      if (mode === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    }

    // Auto-detect on load
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyAppearance(prefersDark ? 'dark' : 'light');

    // ─── Public API (called from Swift / WKWebView) ───────────────────────────

    window.setContent = function(markdown) {
      if (!editor) {
        // Buffer until ready — store as pending
        window._pendingContent = markdown;
        return;
      }
      isSettingContent = true;
      try {
        editor.action(replaceAll(markdown, true));
      } finally {
        // Use rAF so the dispatch cycle finishes before we re-enable change events
        requestAnimationFrame(() => { isSettingContent = false; });
      }
    };

    window.getContent = function() {
      if (!editor) return '';
      return editor.action(getMarkdown());
    };

    window.setAppearance = function(mode) {
      applyAppearance(mode);
    };

    // ─── Create Editor ────────────────────────────────────────────────────────

    editor = await Editor.make()
      .config((ctx) => {
        // Mount into our root div
        ctx.set(rootCtx, document.getElementById('editor-root'));

        // Empty default — content set via setContent() after ready
        ctx.set(defaultValueCtx, '');

        // Wire up change listener
        ctx.get(listenerCtx).markdownUpdated((ctx, markdown, prevMarkdown) => {
          if (isSettingContent) return;
          if (markdown === prevMarkdown) return;
          if (window.webkit?.messageHandlers?.contentChange) {
            window.webkit.messageHandlers.contentChange.postMessage(markdown);
          }
        });
      })
      .use(commonmark)
      .use(gfm)
      .use(listener)
      .create();

    // Apply any content that was set before the editor was ready
    if (window._pendingContent != null) {
      window.setContent(window._pendingContent);
      delete window._pendingContent;
    }

    // Signal Swift that the editor is ready
    if (window.webkit?.messageHandlers?.editorReady) {
      window.webkit.messageHandlers.editorReady.postMessage(null);
    }
  </script>
</body>
</html>
